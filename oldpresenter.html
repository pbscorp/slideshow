    <meta charset="UTF-8">

<body>
<!-- === TRANSACTION CRUD FORM === -->
 <h2>Presenter Management</h2>

<form id="presenterForm">

    <tr><td>
        <label>Operation:</label></td><td>
        <select id="operation" name="operation" required>
            <option value="insert">Insert New Transaction</option>
            <option value="update">Update Transaction</option>
            <option value="delete">Delete Transaction</option>
        </select>
     <!-- Hidden field that id the presenter  -->
        <input type="hidden" id="form-recordId" name="form-recordId" >
        <input type="hidden" id="form-presenterEmail" name="form-presenterEmail" >
        <input type="hidden" id="form-presenterFolder" name="form-presenterEmail" >
    </td></tr>
    <tr><td>
    <!-- For Insert only -->
    
            <label for="form-presenterName">Name:</label> </td><td>
            <input type="text" id="form-presenterName" name="form-presenterName" required>
    </td></tr>
    <tr><td>
            <label for="form-presenterPhone">Phone:</label></td><td>
            <input type="text" id="form-presenterPhone" name="form-presenterPhone" required>
    </td></tr>
    <tr></td>
            <label for="form-presenterAddressLine1">Address:</label> </td><td>
            <input type="text" id="form-presenterAddressLine1" name="form-presenterAddressLine1">
   </td></tr>
    <tr></td>     
            <label for="form-presenterAddressLine2">line2:</label>
            <input type="text" id="form-presenterAddressLine2" name="form-presenterAddressLine2">
            </td></tr>
    <tr></td>     
            <label for="cityStateZip">City / State / zip:</label>
            <input type="text" size="40" id="form-presenterCity" name="form-presenterCity" style="display: inline;">&nbsp
            State: &nbsp: <input type="text" size="2" id="form-presenterState" name="form-presenterState" style="display: inline;">&nbsp
            Zip: &nbsp: <input type="text" size="7" id="form-presenterZip" name="form-presenterZip"style="display: inline;">&nbsp
       </td></tr>
    <tr></td>     
            <label for="form-presenterAbout">Abut:</label>
            <input type="text" id="form-presenterAbout" name="form-presenterAbout">
       </td></tr>
    <tr></td>     
            <label for="form-presenterWebsite">Website:</label>
            <input type="text" id="form-presenterAbout" name="form-presenterWebsite" >
      </td></tr>
    <tr></td>     
            <label for="form-presenterDateAdded">Website:</label>
            <input type="datetime" readonly id="form-presenterDateAdded" name="form-presenterDateAdded" >
       </td></tr>
    <button type="submit" id="presenterSubmitBtn">Submit</button>
</form>

<div id="result"></div>

<style>
    #transactionForm { display: grid; gap: 15px; max-width: 700px; }
    #transactionForm label { font-weight: bold; }
    #transactionForm input, #transactionForm select, #transactionForm button { 
        padding: 10px; font-size: 16px; 
    }
    #transactionForm button { 
        background: #007bff; color: white; border: none; cursor: pointer; 
    }
    #transactionForm button:hover { background: #0056b3; }
    .delete-btn { background: #dc3545 !important; }
    .delete-btn:hover { background: #c82333 !important; }
    #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
</style>
<script>
// Load transactions into dropdown
async function loadTransactions() {
    try {
        const res = await fetch('process_transaction.php?action=list');
        const data = await res.json();
        const select = document.getElementById('transSelect');
        select.innerHTML = '<option value="">-- Select Transaction --</option>';

        data.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;                    // database auto-increment ID
            opt.textContent = `${t.username} - ${t.description.substring(0,30)}`;
            select.appendChild(opt);
        });
    } catch (e) {
        console.error(e);
    }
}

// Populate form when selecting a transaction
document.getElementById('transSelect').addEventListener('change', async function() {
    if (!this.value) return;
    
    try {
        const res = await fetch(`process_transaction.php?action=get&id=${this.value}`);
        const txn = await res.json();
        
        document.getElementById('recordId').value = txn.id;
        document.getElementById('username').value = txn.username || '';
        document.getElementById('description').value = txn.description || '';
        document.getElementById('transDate').value = txn.trans_date || '';
        document.getElementById('category').value = txn.category || '';
    } catch (e) {
        console.error(e);
    }
});

// Form submit
document.getElementById('transactionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Processing...';

    try {
        const response = await fetch('process_transaction.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const text = await response.text();
        console.log('Raw:', text);
        const result = JSON.parse(text);

        if (result.code === 200) {
            resultDiv.style.borderColor = 'green';
            resultDiv.innerHTML = `<strong>✅ Success!</strong><br>${result.message}`;
            // Refresh dropdown after insert/update/delete
            if (data.operation !== 'insert') loadTransactions();
        } else {
            resultDiv.style.borderColor = 'red';
            resultDiv.innerHTML = `<strong>❌ Error</strong><br>${result.message}`;
        }
    } catch (error) {
        console.error(error);
        resultDiv.style.borderColor = 'red';
        resultDiv.innerHTML = `<strong>❌ Error</strong><br>${error.message}`;
    }
});

// Operation change handler
document.getElementById('operation').addEventListener('change', function() {
    const op = this.value;
    const selectContainer = document.getElementById('selectContainer');
    const dataFields = document.getElementById('dataFields');
    const submitBtn = document.getElementById('submitBtn');

    if (op === 'insert') {
        selectContainer.style.display = 'none';
        dataFields.style.display = 'grid';
        submitBtn.textContent = 'Insert Transaction';
        submitBtn.classList.remove('delete-btn');
    } else {
        selectContainer.style.display = 'block';
        dataFields.style.display = 'grid';
        loadTransactions();
        
        submitBtn.textContent = op === 'update' ? 'Update Transaction' : 'Delete Transaction';
        if (op === 'delete') submitBtn.classList.add('delete-btn');
        else submitBtn.classList.remove('delete-btn');
    }
});

// Initial setup
document.getElementById('transDate').value = new Date().toISOString().split('T')[0];
</script>
<!-- === END TRANSACTION FORM === -->
</body>
</html>
